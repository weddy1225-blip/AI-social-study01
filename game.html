<!DOCTYPE html><html lang="zh-TW"><head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 校外教學大考驗</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; background: #000; font-family: sans-serif; overflow: hidden; }
        #map { width: 100vw; height: 100vh; }
        #loginOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 2000; display: flex; align-items: center; justify-content: center; text-align: center; color: white; }
        .login-card { background: #1a1a1a; padding: 30px; border: 3px solid #00d4ff; border-radius: 20px; width: 85%; max-width: 400px; }
        .login-card input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 10px; border: none; font-size: 20px; text-align: center; }
        .btn-start { background: #00d4ff; color: #000; font-weight: bold; border: none; padding: 15px; cursor: pointer; border-radius: 10px; width: 100%; font-size: 18px; }
        #ui { position: absolute; top: 15px; width: 100%; z-index: 1000; display: flex; justify-content: center; pointer-events: none; }
        #statusBar { background: rgba(0,0,0,0.85); color: #00d4ff; padding: 12px 20px; border: 2px solid #00d4ff; width: 85%; display: flex; justify-content: space-between; border-radius: 50px; font-size: 16px; pointer-events: auto; }
        #dialog { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 92%; background: rgba(0,0,0,0.95); color: #fff; border: 3px solid #fff; padding: 20px; box-sizing: border-box; display: none; border-radius: 15px; }
        .btn-box { display: flex; gap: 10px; margin-top: 15px; }
        .btn { flex: 1; background: #333; color: #fff; border: 2px solid #fff; padding: 15px; cursor: pointer; font-size: 17px; border-radius: 10px; }
    </style>
</head><body>

    <div id="loginOverlay">
        <div class="login-card">
            <h1>🎒 校外教學大考驗</h1>
            <input type="text" id="gameIdInput" placeholder="請輸入遊戲 ID">
            <button class="btn-start" onclick="loadGame()">開始考驗</button>
            <p onclick="document.getElementById('gameIdInput').value='text001';loadGame()" style="cursor:pointer; color:#00d4ff; margin-top:15px; font-size:14px;">✨ 點我試玩 (text001)</p>
        </div>
    </div>

    <div id="ui"><div id="statusBar"><span id="sc">⭐ 積分: 0</span><span id="pg">🏁 進度: 1/1</span></div></div>
    <div id="map"></div>

    <div id="dialog">
        <div id="dt" style="font-size:18px; line-height:1.6;"></div>
        <div class="btn-box">
            <button id="bA" class="btn" onclick="tap('A')"></button>
            <button id="bB" class="btn" onclick="tap('B')"></button>
        </div>
    </div>

    <script>
        const gasUrl = 'https://script.google.com/macros/s/AKfycbzQZVw5zKIH1pgtJTZjEuk1o15y2Z1HsOfaDd1R3OGM-S9t5_rK2hFkJ6-Woii5DXdF/exec'; 
        const map = L.map('map', { zoomControl: false }).setView([25.04, 121.51], 13);
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let gameSequence = [], currentIdx = 0, score = 0, perScore = 0, activeMarker = null;

        function loadGame() {
            const id = document.getElementById('gameIdInput').value.trim();
            if(!id) return;
            fetch(`${gasUrl}?gameId=${id}`).then(r => r.json()).then(res => {
                if(res.length > 0) {
                    const start = res.find(n => n.type === 'start');
                    const end = res.find(n => n.type === 'end');
                    const tasks = res.filter(n => n.type === 'task').sort(() => Math.random() - 0.5);
                    gameSequence = [start, ...tasks, end].filter(n => n);
                    perScore = tasks.length > 0 ? Math.round(100/tasks.length) : 0;
                    document.getElementById('loginOverlay').style.display = 'none';
                    startStep();
                } else { alert("找不到 ID"); }
            });
        }

        function startStep() {
            updateUI();
            if(activeMarker) map.removeLayer(activeMarker);
            const d = gameSequence[currentIdx];
            activeMarker = L.marker([d.lat, d.lng]).addTo(map);
            map.flyTo([d.lat, d.lng], 17);
            setTimeout(() => { openDialog(d); }, 1500);
        }

        function openDialog(d) {
            document.getElementById('dialog').style.display = 'block';
            document.getElementById('dt').innerText = d.text;
            if(d.type === 'start') setBtns("出發！", null);
            else if(d.type === 'task') setBtns("A. "+d.optA, "B. "+d.optB);
            else if(d.type === 'end') {
                document.getElementById('dt').innerText += `\n\n最終得分：${score} 分`;
                setBtns("結束", null);
            }
        }

        function setBtns(a, b) {
            document.getElementById('bA').innerText = a;
            document.getElementById('bB').style.display = b ? 'block' : 'none';
            if(b) document.getElementById('bB').innerText = b;
        }

        function tap(ans) {
            const d = gameSequence[currentIdx];
            if(d.type === 'task') {
                if(ans === d.answer) { alert("答對了！"); score += perScore; }
                else alert("答錯了！");
            }
            document.getElementById('dialog').style.display = 'none';
            if(currentIdx < gameSequence.length - 1) { currentIdx++; startStep(); }
            else { alert("挑戰結束！"); location.reload(); }
        }

        function updateUI() {
            document.getElementById('sc').innerText = "⭐ 積分: " + score;
            document.getElementById('pg').innerText = `🏁 進度: ${currentIdx + 1}/${gameSequence.length}`;
        }
    </script>
</body></html>
