<!DOCTYPE html><html lang="zh-TW"><head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">🏆 校外教學大考驗</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; background: #000; font-family: '微軟正黑體', sans-serif; overflow: hidden; }
        #map { width: 100vw; height: 100vh; }

        /* 登入介面 */
        #loginOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 2000; display: flex; align-items: center; justify-content: center; text-align: center; color: white; }
        .login-card { background: #1a1a1a; padding: 40px 30px; border: 3px solid #00d4ff; border-radius: 25px; width: 85%; max-width: 400px; box-shadow: 0 0 30px rgba(0, 212, 255, 0.4); }
        .login-card h1 { font-size: 28px; margin-bottom: 25px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        .login-card input { 
            width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: none; 
            font-size: 20px; text-align: center; background: #fff; color: #333;
            box-sizing: border-box; outline: none;
        }

        .btn-start { 
            background: #00d4ff; color: #000; font-weight: bold; border: none; padding: 15px; 
            cursor: pointer; border-radius: 12px; width: 100%; font-size: 20px;
            box-sizing: border-box; transition: 0.3s;
        }
        .btn-start:active { transform: scale(0.95); background: #fff; }

        .demo-links { margin-top: 20px; font-size: 15px; color: #00d4ff; }
        .demo-link { cursor: pointer; text-decoration: underline; transition: 0.2s; }
        .demo-link:hover { color: #fff; }

        /* 遊戲 UI */
        #ui { position: absolute; top: 15px; width: 100%; z-index: 1000; display: flex; justify-content: center; pointer-events: none; }
        #statusBar { background: rgba(0,0,0,0.85); color: #00d4ff; padding: 12px 25px; border: 2px solid #00d4ff; width: 85%; display: flex; justify-content: space-between; border-radius: 50px; font-size: 16px; font-weight: bold; pointer-events: auto; }
        
        #dialog { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 92%; background: rgba(10,10,10,0.95); color: #fff; border: 3px solid #fff; padding: 25px; box-sizing: border-box; display: none; border-radius: 20px; }
        #dt { font-size: 19px; line-height: 1.6; margin-bottom: 20px; white-space: pre-wrap; }
        .btn-box { display: flex; gap: 12px; }
        .btn { flex: 1; background: #222; color: #fff; border: 2px solid #fff; padding: 16px; cursor: pointer; font-size: 18px; border-radius: 12px; }
        .btn:active { background: #fff; color: #000; }
        .badge { display: inline-block; background: #ffeb3b; color: #000; padding: 4px 12px; border-radius: 6px; font-size: 13px; margin-bottom: 10px; font-weight: bold; }
    </style>
</head><body>

    <div id="loginOverlay">
        <div class="login-card">
            <h1 id="mainTitle">🎒 校外教學大考驗</h1>
            <input type="text" id="gameIdInput" placeholder="請輸入遊戲 ID">
            <button class="btn-start" onclick="loadGame()">開始考驗</button>
            <div class="demo-links">
                ✨ 點我試玩：
                <span class="demo-link" onclick="quickDemo('text001')">(text001)</span>；
                <span class="demo-link" onclick="quickDemo('text002')">(text002)</span>
            </div>
        </div>
    </div>

    <div id="ui"><div id="statusBar"><span id="sc">⭐ 積分: 0</span><span id="pg">🏁 進度: 載入中</span></div></div>
    <div id="map"></div>

    <div id="dialog">
        <div id="badgeTag" class="badge">系統訊息</div>
        <div id="dt"></div>
        <div class="btn-box">
            <button id="bA" class="btn" onclick="tap('A')"></button>
            <button id="bB" class="btn" onclick="tap('B')"></button>
        </div>
    </div>

    <script>
        const gasUrl = 'https://script.google.com/macros/s/AKfycbzQZVw5zKIH1pgtJTZjEuk1o15y2Z1HsOfaDd1R3OGM-S9t5_rK2hFkJ6-Woii5DXdF/exec';
        const map = L.map('map', { zoomControl: false }).setView([25.04, 121.51], 13);
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let gameSequence = [], currentIdx = 0, score = 0, perScore = 0, activeMarker = null;

        function quickDemo(id) {
            document.getElementById('gameIdInput').value = id;
            loadGame();
        }

        function loadGame() {
            const id = document.getElementById('gameIdInput').value.trim();
            if(!id) return alert("請輸入 ID！");

            // --- 新增：ID 判斷與標題切換邏輯 ---
            const mainTitle = document.getElementById('mainTitle');
            const pageTitle = document.getElementById('pageTitle');
            if (id === 'text002') {
                mainTitle.innerHTML = "🌍 全臺旅遊大冒險";
                pageTitle.innerText = "🌍 全臺旅遊大冒險";
            } else {
                mainTitle.innerHTML = "🎒 校外教學大考驗";
                pageTitle.innerText = "🏆 校外教學大考驗";
            }
            // --------------------------------

            fetch(`${gasUrl}?gameId=${id}`).then(r => r.json()).then(res => {
                if(res && res.length > 0) { 
                    processData(res);
                    document.getElementById('loginOverlay').style.display = 'none';
                    startStep(); 
                } else { alert("找不到資料！"); }
            });
        }

        function processData(rawData) {
            const startNode = rawData.find(n => n.type === 'start');
            const endNode = rawData.find(n => n.type === 'end');
            const taskNodes = rawData.filter(n => n.type === 'task').sort(() => Math.random() - 0.5);
            gameSequence = [startNode, ...taskNodes, endNode].filter(n => n);
            perScore = taskNodes.length > 0 ? Math.round(100 / taskNodes.length) : 0;
        }

        function startStep() {
            updateUI();
            if(activeMarker) map.removeLayer(activeMarker);
            const d = gameSequence[currentIdx];
            activeMarker = L.marker([d.lat, d.lng]).addTo(map);
            map.flyTo([d.lat, d.lng], 17);
            setTimeout(() => openDialog(d), 1600);
        }

        function openDialog(d) {
            const dialog = document.getElementById('dialog');
            const badge = document.getElementById('badgeTag');
            dialog.style.display = 'block';
            
            // 處理內容顯示，避免重複累加
            let content = d.text;
            if(d.type === 'start') { 
                badge.innerText="🚩 起點"; 
                setBtns("出發！", null); 
            }
            else if(d.type === 'task') { 
                badge.innerText="❓ 任務"; 
                setBtns("A. "+ (d.optA || ""), "B. "+ (d.optB || "")); 
            }
            else { 
                badge.innerText="🏁 終點"; 
                content += `\n\n🎯 本次冒險最終得分：${score} 分`; 
                setBtns("重新挑戰", null); 
            }
            document.getElementById('dt').innerText = content;
        }

        function setBtns(a, b) {
            document.getElementById('bA').innerText = a;
            document.getElementById('bB').style.display = b ? 'block' : 'none';
            if(b) document.getElementById('bB').innerText = b;
        }

        function tap(ans) {
            const d = gameSequence[currentIdx];
            if(d.type === 'task') { if(ans === d.answer) score += perScore; }
            document.getElementById('dialog').style.display = 'none';
            if(currentIdx < gameSequence.length - 1) { currentIdx++; startStep(); }
            else { location.reload(); }
        }

        function updateUI() {
            document.getElementById('sc').innerText = "⭐ 積分: " + score;
            document.getElementById('pg').innerText = `🏁 進度: ${currentIdx + 1}/${gameSequence.length}`;
        }
    </script>
</body></html>
