<!DOCTYPE html><html lang="zh-TW"><head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 校外教學大考驗</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; background: #000; font-family: '微軟正黑體', sans-serif; overflow: hidden; }
        #map { width: 100vw; height: 100vh; }
        
        /* 入口登入樣式 */
        #loginOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.95); z-index: 2000; display: flex; align-items: center; justify-content: center; text-align: center; color: white; }
        .login-card { background: #1a1a1a; padding: 35px; border: 3px solid #00d4ff; border-radius: 20px; width: 85%; max-width: 400px; box-shadow: 0 0 30px rgba(0, 212, 255, 0.5); }
        .login-card h1 { color: #00d4ff; margin-bottom: 10px; font-size: 32px; text-shadow: 0 0 10px #00d4ff; }
        .login-card p { font-size: 15px; color: #aaa; margin-bottom: 25px; }
        .login-card input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 10px; border: none; font-size: 22px; text-align: center; background: #333; color: #fff; outline: none; }
        .btn-start { background: #00d4ff; color: #000; font-weight: bold; border: none; padding: 15px; cursor: pointer; border-radius: 10px; width: 100%; font-size: 20px; margin-bottom: 15px; transition: 0.3s; }
        .btn-start:hover { background: #fff; transform: scale(1.02); }
        .btn-demo { background: transparent; color: #00d4ff; border: 1px solid #00d4ff; padding: 10px; width: 100%; cursor: pointer; border-radius: 10px; font-size: 14px; }

        /* 遊戲介面 UI */
        #ui { position: absolute; top: 15px; width: 100%; z-index: 1000; display: flex; justify-content: center; pointer-events: none; }
        #statusBar { background: rgba(0,0,0,0.85); color: #00d4ff; padding: 12px 25px; border: 2px solid #00d4ff; width: 85%; display: flex; justify-content: space-between; border-radius: 50px; font-size: 16px; font-weight: bold; pointer-events: auto; }
        
        /* 對話框樣式 */
        #dialog { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 92%; background: rgba(10,10,10,0.98); color: #fff; border: 3px solid #fff; padding: 25px; box-sizing: border-box; display: none; border-radius: 15px; box-shadow: 0 -10px 30px rgba(0,0,0,0.8); }
        #dt { font-size: 20px; line-height: 1.6; margin-bottom: 25px; white-space: pre-wrap; }
        .btn-box { display: flex; gap: 12px; }
        .btn { flex: 1; background: #222; color: #fff; border: 2px solid #fff; padding: 16px; cursor: pointer; font-size: 18px; border-radius: 12px; font-family: inherit; transition: 0.2s; }
        .btn:active { background: #fff; color: #000; transform: scale(0.95); }
        .badge { display: inline-block; background: #ffeb3b; color: #000; padding: 4px 12px; border-radius: 6px; font-size: 13px; margin-bottom: 10px; font-weight: bold; }
    </style>
</head><body>

    <div id="loginOverlay">
        <div class="login-card">
            <h1>🎒 校外教學大考驗</h1>
            <p>準備好接受挑戰了嗎？請輸入遊戲 ID</p>
            <input type="text" id="gameIdInput" placeholder="輸入 ID">
            <button class="btn-start" onclick="loadGame()">進入考驗</button>
            <button class="btn-demo" onclick="quickDemo()">✨ 試玩模式 (ID: text001)</button>
        </div>
    </div>

    <div id="ui">
        <div id="statusBar">
            <span id="sc">⭐ 考驗積分: 0</span>
            <span id="pg">🏁 進度: 1/1</span>
        </div>
    </div>
    <div id="map"></div>

    <div id="dialog">
        <div id="badgeTag" class="badge">系統提示</div>
        <div id="dt"></div>
        <div class="btn-box">
            <button id="bA" class="btn" onclick="tap('A')"></button>
            <button id="bB" class="btn" onclick="tap('B')"></button>
        </div>
    </div>

    <script>
        const gasUrl = 'https://script.google.com/macros/s/AKfycbzQZVw5zKIH1pgtJTZjEuk1o15y2Z1HsOfaDd1R3OGM-S9t5_rK2hFkJ6-Woii5DXdF/exec'; // 👈 記得替換成你的連結
        
        const map = L.map('map', { zoomControl: false }).setView([25.04, 121.51], 13);
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let gameSequence = [], currentIdx = 0, score = 0, perScore = 0;
        let activeMarker = null;

        function quickDemo() {
            document.getElementById('gameIdInput').value = 'text001';
            loadGame();
        }

        function loadGame() {
            const id = document.getElementById('gameIdInput').value.trim();
            if(!id) return alert("請輸入 ID！");
            document.querySelector('.btn-start').innerText = "地圖建置中...";

            fetch(`${gasUrl}?gameId=${id}`)
            .then(r => r.json())
            .then(res => {
                if(res && res.length > 0) { 
                    processGameData(res);
                    document.getElementById('loginOverlay').style.display = 'none';
                    startStep(); 
                } else {
                    alert("找不到該 ID，請檢查輸入是否正確！");
                    document.querySelector('.btn-start').innerText = "進入考驗";
                }
            })
            .catch(() => alert("連線失敗，請確認 GAS 部署是否正確。"));
        }

        // 核心邏輯：確保起點開頭，隨機打散任務，終點結束
        function processGameData(rawData) {
            const startNode = rawData.find(n => n.type === 'start');
            const endNode = rawData.find(n => n.type === 'end');
            const taskNodes = rawData.filter(n => n.type === 'task');

            // 隨機洗牌演算法
            for (let i = taskNodes.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [taskNodes[i], taskNodes[j]] = [taskNodes[j], taskNodes[i]];
            }

            gameSequence = [];
            if(startNode) gameSequence.push(startNode);
            gameSequence = gameSequence.concat(taskNodes);
            if(endNode) gameSequence.push(endNode);

            perScore = taskNodes.length > 0 ? Math.round(100 / taskNodes.length) : 0;
        }

        function startStep() {
            updateUI();
            if(activeMarker) map.removeLayer(activeMarker);

            const d = gameSequence[currentIdx];
            activeMarker = L.marker([d.lat, d.lng]).addTo(map);

            // 地圖自動飛向目標
            map.flyTo([d.lat, d.lng], 17, { animate: true, duration: 1.5 });

            // 抵達後自動彈出對話
            setTimeout(() => { 
                openDialog(d); 
                activeMarker.bindPopup(`<b>📍 目前位置：第 ${currentIdx + 1} 站</b>`).openPopup();
            }, 1600);

            activeMarker.on('click', () => { openDialog(d); });
        }

        function openDialog(d) {
            const dialog = document.getElementById('dialog');
            const badge = document.getElementById('badgeTag');
            dialog.style.display = 'block';
            document.getElementById('dt').innerText = d.text;
            
            if(d.type === 'start') {
                badge.innerText = "🚩 考驗起點";
                badge.style.background = "#4caf50";
                badge.style.color = "#fff";
                setBtns("收到，出發！", null);
            } else if(d.type === 'task') {
                badge.innerText = "❓ 任務挑戰";
                badge.style.background = "#ffeb3b";
                badge.style.color = "#000";
                setBtns("A. " + d.optA, "B. " + d.optB);
            } else if(d.type === 'end') {
                badge.innerText = "🏁 考驗終點";
                badge.style.background = "#00d4ff";
                badge.style.color = "#000";
                let feedback = `\n\n【 結算成績 】\n本次考驗得分：${score} 分`;
                document.getElementById('dt').innerText += feedback;
                setBtns("結束大考驗", null);
            }
        }

        function setBtns(txtA, txtB) {
            document.getElementById('bA').innerText = txtA;
            if(txtB) { 
                document.getElementById('bB').style.display = 'block'; 
                document.getElementById('bB').innerText = txtB; 
            } else { 
                document.getElementById('bB').style.display = 'none'; 
            }
        }

        function tap(ans) {
            const d = gameSequence[currentIdx];
            if(d.type === 'task') {
                if(ans === d.answer) { alert("🌟 答對了！"); score += perScore; }
                else { alert("🤔 答錯了，再接再厲！"); }
            }

            document.getElementById('dialog').style.display = 'none';

            if(currentIdx < gameSequence.length - 1) {
                currentIdx++;
                startStep();
            } else {
                alert("感謝參加「校外教學大考驗」！");
                location.reload();
            }
        }

        function updateUI() {
            document.getElementById('sc').innerText = "⭐ 考驗積分: " + score;
            document.getElementById('pg').innerText = `🏁 進度: ${currentIdx + 1}/${gameSequence.length}`;
        }
    </script>
</body></html>
