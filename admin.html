<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全台旅遊大冒險 - 老師管理端</title>
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&libraries=places"></script>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 850px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; text-align: center; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-top: 0; }
        
        .form-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; font-size: 14px; }
        input, textarea, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        textarea { height: 100px; resize: vertical; }

        #map { height: 350px; width: 100%; margin: 15px 0; border-radius: 10px; border: 1px solid #ddd; }

        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        .add-btn { background-color: #4caf50; color: white; }
        .add-btn:hover { background-color: #45a049; }
        .save-btn { background-color: #2196f3; color: white; }
        .save-btn:hover { background-color: #1e88e5; }

        /* 點位清單樣式 - 修正溢出問題 */
        .point-list { margin-top: 30px; border-top: 2px solid #eee; padding-top: 20px; }
        .point-item { 
            background: #fff; 
            border: 1px solid #ddd; 
            padding: 15px; 
            margin-bottom: 12px; 
            border-radius: 10px; 
            cursor: pointer; 
            position: relative; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .point-item:hover { background: #f0f8ff; border-color: #00d4ff; }
        .point-info { flex: 1; padding-right: 60px; word-break: break-all; }
        .point-info b { color: #2c3e50; display: block; margin-bottom: 4px; }
        .point-info span { font-size: 13px; color: #777; }

        .del-sub-btn { 
            position: absolute; 
            right: 12px; 
            top: 15px; 
            background: #ff5252; 
            color: white; 
            padding: 5px 10px; 
            font-size: 12px; 
            border-radius: 6px; 
            border: none;
            cursor: pointer;
            z-index: 10;
        }
        .del-sub-btn:hover { background: #d32f2f; }
    </style>
</head>
<body>

<div class="container">
    <h2>📍 全台旅遊大冒險：題目編輯器</h2>
    
    <div class="form-section">
        <div>
            <div class="form-group">
                <label>地點名稱 (輸入後按 Enter 定位)</label>
                <input type="text" id="placeName" placeholder="例如：桃園國際機場" onkeypress="if(event.keyCode==13) searchPlace()">
            </div>
            <div class="form-group">
                <label>選項 A (正確答案)</label>
                <input type="text" id="optionA" placeholder="請輸入正確答案">
            </div>
            <div class="form-group">
                <label>選項 B (似是而非的答案)</label>
                <input type="text" id="optionB" placeholder="請輸入誘導性錯誤答案">
            </div>
            <div class="form-group">
                <label>關卡類型</label>
                <select id="pointType">
                    <option value="Task">挑戰題目 (Task)</option>
                    <option value="Start">遊戲起點 (Start)</option>
                    <option value="End">遊戲終點 (End)</option>
                </select>
            </div>
        </div>
        <div>
            <div class="form-group">
                <label>題目內容 / 介紹詞 (3-4年級程度)</label>
                <textarea id="placeDesc" placeholder="請輸入題目敘述..."></textarea>
            </div>
            <div id="map"></div>
        </div>
    </div>

    <div class="btn-group">
        <button class="add-btn" onclick="addPoint()">➕ 新增/更新點位</button>
        <button class="save-btn" onclick="saveToCloud()">🚀 發布至 GAS 雲端</button>
    </div>

    <div class="point-list" id="pointList">
        <h3>🚩 已設定的冒險路線</h3>
        </div>
</div>

<script>
    let map, marker, autocomplete;
    let points = [];
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzQZVw5zKIH1pgtJTZjEuk1o15y2Z1HsOfaDd1R3OGM-S9t5_rK2hFkJ6-Woii5DXdF/exec";

    function initMap() {
        map = new google.maps.Map(document.getElementById('map'), {
            center: { lat: 23.6, lng: 121.0 }, // 台灣中心
            zoom: 7
        });
        marker = new google.maps.Marker({ map: map, draggable: true });
        
        const input = document.getElementById('placeName');
        autocomplete = new google.maps.places.Autocomplete(input);
        autocomplete.addListener('place_changed', searchPlace);
    }

    function searchPlace() {
        const place = autocomplete.getPlace();
        if (!place || !place.geometry) {
            const service = new google.maps.places.PlacesService(map);
            service.findPlaceFromQuery({
                query: document.getElementById('placeName').value,
                fields: ['geometry', 'name']
            }, (results, status) => {
                if (status === google.maps.places.PlacesServiceStatus.OK) {
                    updateMap(results[0].geometry.location);
                }
            });
            return;
        }
        updateMap(place.geometry.location);
    }

    function updateMap(location) {
        map.setCenter(location);
        map.setZoom(15);
        marker.setPosition(location);
    }

    function addPoint() {
        const name = document.getElementById('placeName').value;
        const desc = document.getElementById('placeDesc').value;
        const a = document.getElementById('optionA').value;
        const b = document.getElementById('optionB').value;
        const type = document.getElementById('pointType').value;
        const pos = marker.getPosition();

        if (!name || !pos) return alert("請先輸入地點並在地圖上定位！");

        const newPoint = { 
            name, desc, optionA: a, optionB: b, type,
            lat: pos.lat(), lng: pos.lng() 
        };
        
        points.push(newPoint);
        renderList();
        clearForm();
    }

    function renderList() {
        const list = document.getElementById('pointList');
        list.innerHTML = '<h3>🚩 已設定的冒險路線</h3>';
        points.forEach((p, index) => {
            list.innerHTML += `
                <div class="point-item" onclick="editPoint(${index})">
                    <div class="point-info">
                        <b>【${p.type}】${p.name}</b>
                        <span>${p.desc.substring(0, 30)}...</span>
                    </div>
                    <button class="del-sub-btn" onclick="event.stopPropagation(); delPoint(${index})">刪除</button>
                </div>
            `;
        });
    }

    function delPoint(index) {
        points.splice(index, 1);
        renderList();
    }

    function clearForm() {
        document.getElementById('placeName').value = "";
        document.getElementById('placeDesc').value = "";
        document.getElementById('optionA').value = "";
        document.getElementById('optionB').value = "";
    }

    async function saveToCloud() {
        if (points.length === 0) return alert("目前沒有設定任何點位！");
        
        const password = prompt("請輸入管理員發布密碼：");
        if (!password) return;

        try {
            const response = await fetch(GAS_URL, {
                method: "POST",
                body: JSON.stringify({ action: "saveGame", data: points, pwd: password })
            });
            const result = await response.json();
            alert(result.message || "發布成功！");
        } catch (e) {
            alert("發布失敗，請檢查 GAS 權限或網址。");
        }
    }

    window.onload = initMap;
</script>

</body>
</html>
