<!DOCTYPE html><html lang="zh-TW"><head>
    <meta charset="UTF-8"><title>🛠️ 老師端 - 校外教學路線製作</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; height: 100vh; margin: 0; background: #f4f4f4; }
        #map { flex: 1; }
        #panel { width: 380px; padding: 20px; background: white; overflow-y: auto; box-shadow: -2px 0 10px rgba(0,0,0,0.1); }
        .control-group { background: #eee; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        input, select, textarea, button { width: 100%; margin-bottom: 10px; padding: 10px; box-sizing: border-box; }
        button { cursor: pointer; border: none; border-radius: 5px; font-weight: bold; }
        .btn-add { background: #4caf50; color: white; }
        .btn-pub { background: #00d4ff; color: black; font-size: 18px; margin-top: 20px; }
        .btn-load { background: #ff9800; color: white; }
        .btn-del { background: #f44336; color: white; }
        .point-item { border-bottom: 1px solid #ddd; padding: 10px 0; font-size: 14px; }
    </style>
</head><body>

    <div id="map"></div>
    <div id="panel">
        <h2>🛠️ 路線製作控制台</h2>
        
        <div class="control-group">
            <label>1. 遊戲 ID 管理</label>
            <input type="text" id="customId" placeholder="輸入遊戲 ID (例如: text001)">
            <div style="display:flex; gap:5px;">
                <button class="btn-load" onclick="loadExistingGame()">載入舊資料</button>
                <button class="btn-del" onclick="deleteGame()">刪除 ID</button>
            </div>
        </div>

        <div id="editor" class="control-group">
            <label>2. 新增點位 (在地圖點擊或搜尋)</label>
            <input type="text" id="search" placeholder="搜尋地點 (例如: 台北車站)" onchange="geoSearch()">
            <input type="text" id="curName" placeholder="地點名稱">
            <select id="curType" onchange="toggleFields()">
                <option value="start">🚩 冒險起點 (Start)</option>
                <option value="task">❓ 任務點 (Task)</option>
                <option value="end">🏁 冒險終點 (End)</option>
            </select>
            <textarea id="curText" placeholder="對話內容或題目"></textarea>
            <div id="taskFields" style="display:none;">
                <input type="text" id="optA" placeholder="選項 A">
                <input type="text" id="optB" placeholder="選項 B">
                <select id="ans">
                    <option value="A">正確答案：A</option>
                    <option value="B">正確答案：B</option>
                </select>
            </div>
            <button class="btn-add" onclick="addPoint()">加入路線</button>
        </div>

        <h3>📍 已加入點位</h3>
        <div id="pointList"></div>
        <button class="btn-pub" onclick="publishGame()">🚀 發布 / 更新遊戲</button>
    </div>

    <script>
        const gasUrl = 'https://script.google.com/macros/s/AKfycbzQZVw5zKIH1pgtJTZjEuk1o15y2Z1HsOfaDd1R3OGM-S9t5_rK2hFkJ6-Woii5DXdF/exec'; // 👈 記得填入
        const map = L.map('map').setView([25.04, 121.51], 13);
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let points = [];
        let markers = [];
        let tempMarker = null;

        map.on('click', e => {
            const { lat, lng } = e.latlng;
            setTempMarker(lat, lng, "自選地點");
        });

        function geoSearch() {
            const q = document.getElementById('search').value;
            fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}`)
                .then(r => r.json()).then(res => {
                    if(res.length > 0) {
                        const { lat, lon, display_name } = res[0];
                        map.setView([lat, lon], 16);
                        setTempMarker(lat, lon, display_name);
                    }
                });
        }

        function setTempMarker(lat, lng, name) {
            if(tempMarker) map.removeLayer(tempMarker);
            tempMarker = L.marker([lat, lng], {draggable: true}).addTo(map).bindPopup("新點位預覽").openPopup();
            document.getElementById('curName').value = name.split(',')[0];
        }

        function toggleFields() {
            document.getElementById('taskFields').style.display = document.getElementById('curType').value === 'task' ? 'block' : 'none';
        }

        function addPoint() {
            if(!tempMarker) return alert("請先在地圖上選點");
            const pos = tempMarker.getLatLng();
            const p = {
                type: document.getElementById('curType').value,
                lat: pos.lat, lng: pos.lng,
                placeName: document.getElementById('curName').value,
                text: document.getElementById('curText').value,
                optA: document.getElementById('optA').value,
                optB: document.getElementById('optB').value,
                answer: document.getElementById('ans').value
            };
            points.push(p);
            renderList();
            map.removeLayer(tempMarker); tempMarker = null;
        }

        function renderList() {
            const list = document.getElementById('pointList');
            list.innerHTML = "";
            markers.forEach(m => map.removeLayer(m));
            markers = [];

            points.forEach((p, i) => {
                const div = document.createElement('div');
                div.className = 'point-item';
                div.innerHTML = `<b>${i+1}. [${p.type}]</b> ${p.placeName} <button onclick="points.splice(${i},1);renderList()" style="width:auto; padding:2px 5px;">刪除</button>`;
                list.appendChild(div);
                
                const m = L.marker([p.lat, p.lng]).addTo(map).bindPopup(`${i+1}. ${p.placeName}`);
                markers.push(m);
            });
        }

        function loadExistingGame() {
            const id = document.getElementById('customId').value;
            if(!id) return alert("請輸入 ID");
            fetch(`${gasUrl}?gameId=${id}`).then(r => r.json()).then(data => {
                if(data.length === 0) return alert("找不到資料");
                points = data;
                renderList();
                alert("載入成功，現在可以編輯後重新發布。");
            });
        }

        function deleteGame() {
            const id = document.getElementById('customId').value;
            if(!id || !confirm("確定刪除此 ID 的所有資料？")) return;
            fetch(gasUrl, { method: 'POST', body: JSON.stringify({ action: "delete", customId: id }) })
            .then(r => r.json()).then(() => { alert("已刪除"); location.reload(); });
        }

        function publishGame() {
            const id = document.getElementById('customId').value;
            if(!id || points.length === 0) return alert("請填寫 ID 並至少加入一個點位");
            fetch(gasUrl, { method: 'POST', body: JSON.stringify({ action: "publish", customId: id, data: points }) })
            .then(r => r.json()).then(res => { if(res.status==="success") alert("🚀 遊戲已成功更新/發布！"); });
        }
    </script>
</body></html>
